<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ΔΧ Purdue — Content Manager</title>
  
  <style>
    :root {
      --maroon: #8B0000;
      --gold: #D4AF37;
      --gray-900: #1D1D1F;
      --gray-600: #6E6E73;
      --gray-100: #F5F5F7;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--gray-100);
      min-height: 100vh;
    }
    
    .admin-header {
      background: white;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .admin-logo {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--gray-900);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .admin-logo span {
      color: var(--maroon);
    }
    
    .back-link {
      font-size: 0.875rem;
      color: var(--maroon);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--maroon);
      transition: all 0.2s ease;
    }
    
    .back-link:hover {
      background: var(--maroon);
      color: white;
    }
    
    /* Loading state */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: var(--gray-600);
    }
    
    .loading-state h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--gray-900);
    }
    
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--gray-100);
      border-top-color: var(--maroon);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Override some Decap CMS styles */
    [data-slate-editor] { font-family: inherit !important; }
  </style>
</head>
<body>
  <header class="admin-header">
    <a class="admin-logo" href="../">
      <span>ΔΧ</span> Content Manager
    </a>
    <a class="back-link" href="../">← Back to Site</a>
  </header>
  
  <div class="loading-state" id="loading">
    <div class="loading-spinner"></div>
    <h2>Loading Content Manager</h2>
    <p>Please wait while we set things up...</p>
  </div>

  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            window.location.href = '/admin/';
          });
        }
      });
    }
  </script>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Hide loading state once CMS loads
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      }, 1000);
    });
  </script>
</body>
</html>
