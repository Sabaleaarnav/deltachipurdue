<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Photo gallery from Delta Chi Fraternity at Purdue University. Brotherhood in action.">
  
  <title>Gallery — Delta Chi Purdue</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="gallery">
  <header id="site-header" class="site-header"></header>
  
  <main>
    <section class="section pt-header">
      <div class="container">
        <div class="section-header fade-in">
          <span class="overline">Memories</span>
          <h2 class="headline-lg">Photo Gallery</h2>
          <p>Brotherhood, service, and everything in between.</p>
        </div>
        
        <!-- Gallery Grid -->
        <div class="gallery-grid" id="gallery-grid">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>
    
    <!-- Follow CTA -->
    <section class="section section-gray">
      <div class="container text-center">
        <h3 class="headline-md fade-in">Want More?</h3>
        <p class="fade-in stagger-1" style="color: var(--gray-600); margin-bottom: var(--space-lg);">
          Follow us on Instagram for the latest updates.
        </p>
        <div class="fade-in stagger-2">
          <a href="https://instagram.com/deltachipurdue" target="_blank" rel="noopener" class="btn btn-primary">
            Follow @deltachipurdue
          </a>
        </div>
      </div>
    </section>
  </main>
  
  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="Close lightbox">×</button>
    <div class="lightbox-content">
      <img src="" alt="" id="lightbox-img">
    </div>
  </div>
  
  <footer id="site-footer" class="site-footer"></footer>
  
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
